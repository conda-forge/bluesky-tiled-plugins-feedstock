{% set name = "bluesky-tiled-plugins" %}
{% set version = "2.0.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/75/e0/aa41bc8c1187a5aa94014f4f12bca8fbb6ecc5f39c0836da900eaaaad4d3/bluesky_tiled_plugins-{{ version }}.tar.gz
  sha256: 484d368487e5cb8e83ca808c491bb71c4e3baad94a932a65079774b82e4592da

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - dask-core
    - event-model
    - mongoquery
    - pytz
    - tiled-client >=0.2.0
    - tzlocal

test:
  imports:
    - bluesky_tiled_plugins
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  summary: Tiled client plugins to provide an customized user experience for Bluesky data in Tiled
  home: http://blueskyproject.io
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  description: For a user wishing to connect to a running Tiled server and access Bluesky data, this package, along with its dependency tiled[client], is all they need.
  doc_url: http://blueskyproject.io/databroker
  dev_url: https://github.com/bluesky/databroker/tree/main/bluesky-tiled-plugins

extra:
  recipe-maintainers:
    - nmaytan
    - danielballan
    - mrakitin
